<svg viewBox="0 0 960 680" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="960" height="680" fill="#f8f9fc"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e293b">Marketplace Freelance — Diagrama de Contenedores (C4 Nivel 2)</text>
  <text x="480" y="58" text-anchor="middle" font-size="12" fill="#64748b">¿Cómo está dividido el sistema en contenedores Docker?</text>

  <!-- System boundary box -->
  <rect x="30" y="80" width="900" height="470" rx="14" fill="none" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="10,5"/>
  <rect x="30" y="68" width="260" height="24" rx="6" fill="#0ea5e9"/>
  <text x="160" y="84" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Sistema: Marketplace Freelance</text>

  <!-- ========================= FRONTEND CONTAINER ========================= -->
  <rect x="60" y="140" width="230" height="180" rx="12" fill="#6366f1" stroke="#4338ca" stroke-width="2"/>
  <text x="175" y="168" text-anchor="middle" font-size="13" font-weight="bold" fill="white">🖥️ Frontend</text>
  <text x="175" y="185" text-anchor="middle" font-size="10" fill="#e0e7ff">[Contenedor: Next.js 15]</text>
  <line x1="75" y1="195" x2="275" y2="195" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <text x="175" y="211" text-anchor="middle" font-size="10" fill="#e0e7ff">App Router · Tailwind CSS</text>
  <text x="175" y="226" text-anchor="middle" font-size="10" fill="#e0e7ff">Páginas: Dashboard, Freelancers,</text>
  <text x="175" y="241" text-anchor="middle" font-size="10" fill="#e0e7ff">Clientes, Servicios, Solicitudes,</text>
  <text x="175" y="256" text-anchor="middle" font-size="10" fill="#e0e7ff">Proyectos, Categorías</text>
  <text x="175" y="274" text-anchor="middle" font-size="10" fill="#c7d2fe">Puerto: 3000</text>
  <text x="175" y="291" text-anchor="middle" font-size="10" fill="#c7d2fe">Docker: marketplace_frontend</text>
  <text x="175" y="308" text-anchor="middle" font-size="10" fill="#c7d2fe">TypeScript · fetch API</text>

  <!-- ========================= BACKEND CONTAINER ========================= -->
  <rect x="365" y="140" width="230" height="180" rx="12" fill="#0ea5e9" stroke="#0284c7" stroke-width="2"/>
  <text x="480" y="168" text-anchor="middle" font-size="13" font-weight="bold" fill="white">⚙️ Backend API</text>
  <text x="480" y="185" text-anchor="middle" font-size="10" fill="#e0f2fe">[Contenedor: NestJS 11]</text>
  <line x1="380" y1="195" x2="580" y2="195" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <text x="480" y="211" text-anchor="middle" font-size="10" fill="#e0f2fe">REST API · Prisma ORM</text>
  <text x="480" y="226" text-anchor="middle" font-size="10" fill="#e0f2fe">Módulos: Freelancers, Clientes,</text>
  <text x="480" y="241" text-anchor="middle" font-size="10" fill="#e0f2fe">Servicios, Solicitudes, Proyectos,</text>
  <text x="480" y="256" text-anchor="middle" font-size="10" fill="#e0f2fe">Habilidades, Categorías</text>
  <text x="480" y="274" text-anchor="middle" font-size="10" fill="#bae6fd">Puerto: 3001  ·  Prefijo: /api/v1</text>
  <text x="480" y="291" text-anchor="middle" font-size="10" fill="#bae6fd">Docker: marketplace_backend</text>
  <text x="480" y="308" text-anchor="middle" font-size="10" fill="#bae6fd">ValidationPipe · CORS habilitado</text>

  <!-- ========================= DATABASE CONTAINER ========================= -->
  <rect x="670" y="140" width="230" height="180" rx="12" fill="#475569" stroke="#334155" stroke-width="2"/>
  <text x="785" y="168" text-anchor="middle" font-size="13" font-weight="bold" fill="white">🐘 Base de Datos</text>
  <text x="785" y="185" text-anchor="middle" font-size="10" fill="#e2e8f0">[Contenedor: PostgreSQL 16]</text>
  <line x1="685" y1="195" x2="885" y2="195" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <text x="785" y="211" text-anchor="middle" font-size="10" fill="#e2e8f0">Tablas: freelancers, clientes,</text>
  <text x="785" y="226" text-anchor="middle" font-size="10" fill="#e2e8f0">servicios, solicitudes, proyectos,</text>
  <text x="785" y="241" text-anchor="middle" font-size="10" fill="#e2e8f0">categorias_servicio, habilidades,</text>
  <text x="785" y="256" text-anchor="middle" font-size="10" fill="#e2e8f0">calificaciones</text>
  <text x="785" y="274" text-anchor="middle" font-size="10" fill="#cbd5e1">Puerto: 5432</text>
  <text x="785" y="291" text-anchor="middle" font-size="10" fill="#cbd5e1">Docker: marketplace_db</text>
  <text x="785" y="308" text-anchor="middle" font-size="10" fill="#cbd5e1">Volume: postgres_data</text>

  <!-- ========================= ARROWS ========================= -->
  <!-- Frontend → Backend -->
  <line x1="292" y1="225" x2="363" y2="225" stroke="#1e293b" stroke-width="1.8"/>
  <polygon points="363,225 352,219 352,231" fill="#1e293b"/>
  <polygon points="292,225 303,219 303,231" fill="#1e293b"/>
  <rect x="295" y="210" width="66" height="28" rx="5" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  <text x="328" y="222" text-anchor="middle" font-size="9" fill="#475569">HTTP / REST</text>
  <text x="328" y="233" text-anchor="middle" font-size="9" fill="#475569">JSON · CORS</text>

  <!-- Backend → DB -->
  <line x1="597" y1="225" x2="668" y2="225" stroke="#1e293b" stroke-width="1.8"/>
  <polygon points="668,225 657,219 657,231" fill="#1e293b"/>
  <rect x="603" y="210" width="62" height="28" rx="5" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  <text x="634" y="222" text-anchor="middle" font-size="9" fill="#475569">Prisma ORM</text>
  <text x="634" y="233" text-anchor="middle" font-size="9" fill="#475569">TCP:5432</text>

  <!-- ========================= INFRASTRUCTURE DETAILS ========================= -->
  <!-- Docker Compose box -->
  <rect x="60" y="370" width="840" height="150" rx="12" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="60" y="370" width="840" height="32" rx="12" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="480" y="391" text-anchor="middle" font-size="12" font-weight="bold" fill="#334155">🐳 Docker Compose — Infraestructura de Orquestación</text>

  <!-- 3 service boxes inside -->
  <rect x="80" y="412" width="240" height="95" rx="8" fill="#ede9fe" stroke="#a5b4fc" stroke-width="1"/>
  <text x="200" y="432" text-anchor="middle" font-size="11" font-weight="bold" fill="#4338ca">marketplace_frontend</text>
  <text x="200" y="449" text-anchor="middle" font-size="10" fill="#5b21b6">image: node:22 + next build</text>
  <text x="200" y="464" text-anchor="middle" font-size="10" fill="#5b21b6">ports: 3000:3000</text>
  <text x="200" y="479" text-anchor="middle" font-size="10" fill="#5b21b6">depends_on: backend</text>
  <text x="200" y="497" text-anchor="middle" font-size="10" fill="#5b21b6">NEXT_PUBLIC_API_URL=:3001</text>

  <rect x="360" y="412" width="240" height="95" rx="8" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1"/>
  <text x="480" y="432" text-anchor="middle" font-size="11" font-weight="bold" fill="#0369a1">marketplace_backend</text>
  <text x="480" y="449" text-anchor="middle" font-size="10" fill="#075985">image: node:22 + nest build</text>
  <text x="480" y="464" text-anchor="middle" font-size="10" fill="#075985">ports: 3001:3001</text>
  <text x="480" y="479" text-anchor="middle" font-size="10" fill="#075985">depends_on: db (healthcheck)</text>
  <text x="480" y="497" text-anchor="middle" font-size="10" fill="#075985">DATABASE_URL via .env</text>

  <rect x="640" y="412" width="240" height="95" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="760" y="432" text-anchor="middle" font-size="11" font-weight="bold" fill="#334155">marketplace_db</text>
  <text x="760" y="449" text-anchor="middle" font-size="10" fill="#475569">image: postgres:16-alpine</text>
  <text x="760" y="464" text-anchor="middle" font-size="10" fill="#475569">ports: 5432:5432</text>
  <text x="760" y="479" text-anchor="middle" font-size="10" fill="#475569">volume: postgres_data</text>
  <text x="760" y="497" text-anchor="middle" font-size="10" fill="#475569">healthcheck: pg_isready</text>

  <!-- External actors at bottom -->
  <rect x="30" y="570" width="900" height="90" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Cliente actor -->
  <circle cx="120" cy="610" r="20" fill="#6366f1"/>
  <text x="120" y="616" text-anchor="middle" font-size="15" fill="white">🧑‍💼</text>
  <text x="120" y="644" text-anchor="middle" font-size="11" fill="#334155">Cliente</text>
  <line x1="140" y1="610" x2="175" y2="140" stroke="#6366f1" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- Freelancer actor -->
  <circle cx="840" cy="610" r="20" fill="#6366f1"/>
  <text x="840" y="616" text-anchor="middle" font-size="15" fill="white">👨‍💻</text>
  <text x="840" y="644" text-anchor="middle" font-size="11" fill="#334155">Freelancer</text>
  <line x1="820" y1="610" x2="785" y2="140" stroke="#6366f1" stroke-width="1" stroke-dasharray="5,3"/>

  <text x="480" y="613" text-anchor="middle" font-size="11" fill="#64748b">Ambos actores acceden al sistema a través del</text>
  <text x="480" y="630" text-anchor="middle" font-size="11" font-weight="bold" fill="#0ea5e9">Frontend Next.js (puerto 3000) → REST API NestJS (puerto 3001) → PostgreSQL (puerto 5432)</text>
</svg>
