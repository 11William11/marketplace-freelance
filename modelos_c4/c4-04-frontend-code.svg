  <!-- ===== LAYER 4: HTTP Client ===== -->
  <rect x="40" y="630" width="930" height="88" rx="10" fill="#172554" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="505" y="654" text-anchor="middle" font-size="12" font-weight="bold" fill="#93c5fd">src/lib/api.ts — Cliente HTTP Centralizado</text>
  <text x="505" y="671" text-anchor="middle" font-size="10" fill="#60a5fa">apiGet&lt;T&gt;(path)   apiPost&lt;T&gt;(path, body)   apiPut&lt;T&gt;(path, body)   apiDelete&lt;T&gt;(path)</text>
  <text x="505" y="688" text-anchor="middle" font-size="10" fill="#60a5fa">BASE_URL: NEXT_PUBLIC_API_URL || http://localhost:3001  →  respuesta: {"statusCode","message","data"} → extrae .data</text>
  <text x="505" y="705" text-anchor="middle" font-size="10" fill="#60a5fa">Content-Type: application/json  ·  Error handling: res.ok check → throw Error(err.message)</text>

